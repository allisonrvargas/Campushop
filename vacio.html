<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusShop – Carrito Vacío</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
<div class="container">

  <header class="header">
    <a href="index.html" class="header__back" aria-label="Volver">←</a>
    <span class="header__logo">CampusShop</span>
    <nav class="header__nav">
      <a href="index.html">Inicio</a>
      <a href="catalogo.html">Catálogo</a>
      <a href="historial.html">Pedidos</a>
      <a href="perfil.html">Perfil</a>
    </nav>
    <a href="carrito.html" class="header__icon-btn" aria-label="Ver carrito">🛒</a>
  </header>

  <main class="main">
    <section class="vacio-container" aria-label="Carrito vacío">
      <div class="vacio-icono">🛒</div>
      <h2 class="vacio-titulo">Tu carrito está vacío</h2>
      <p class="vacio-desc">
        Parece que aún no has añadido nada.<br />¡Explora nuestros productos!
      </p>
      <a href="catalogo.html" class="btn-primary" style="max-width: 280px;">
        Explorar Catálogo
      </a>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="Navegación">
    <a href="index.html" class="bottom-nav__item">
      <img src="img/casa.png" alt="Inicio" class="nav-img-icon" />
      <span>Inicio</span>
    </a>
    <a href="catalogo.html" class="bottom-nav__item">
      <img src="img/catalogo.png" alt="Catálogo" class="nav-img-icon" />
      <span>Catálogo</span>
    </a>
    <a href="vacio.html" class="bottom-nav__item active">
      <img src="img/carro_de_compras.png" alt="Carrito" class="nav-img-icon" />
      <span>Carrito</span>
    </a>
    <a href="historial.html" class="bottom-nav__item">
      <img src="img/pedido.png" alt="Pedidos" class="nav-img-icon" />
      <span>Pedidos</span>
    </a>
    <a href="perfil.html" class="bottom-nav__item">
      <img src="img/perfil.png" alt="Perfil" class="nav-img-icon" />
      <span>Perfil</span>
    </a>
  </nav>

</div>
</body>
</html>
