<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusShop – Checkout</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
<div class="container">

  <header class="page-header">
    <a href="carrito.html" class="page-header__back" aria-label="Volver">←</a>
    <h1 class="page-header__title">Checkout</h1>
    <div class="page-header__right"></div>
  </header>

  <main class="main" style="padding-bottom: 0;">

    <section class="form-section" aria-label="Datos de envío">
      <h2>Envío</h2>
      <div class="form-group">
        <label for="nombre">Nombre Completo</label>
        <input type="text" id="nombre" placeholder="Ingresa tu nombre completo" autocomplete="name" />
      </div>
      <div class="form-group">
        <label for="direccion">Dirección</label>
        <input type="text" id="direccion" placeholder="Ingresa tu dirección" autocomplete="street-address" />
      </div>
      <div class="form-group">
        <label for="ciudad">Ciudad</label>
        <input type="text" id="ciudad" placeholder="Tu ciudad" autocomplete="address-level2" />
      </div>
      <div class="form-group">
        <label for="telefono">Teléfono</label>
        <input type="tel" id="telefono" placeholder="Tu número de teléfono" autocomplete="tel" />
      </div>
    </section>

    <section aria-label="Método de pago">
      <h2 class="section-title">Método de Pago</h2>
      <div class="metodos-pago" role="group">
        <button class="metodo-btn active" aria-pressed="true">
          <span class="icon">💳</span><span>Visa</span>
        </button>
        <button class="metodo-btn" aria-pressed="false">
          <span class="icon">💳</span><span>MasterCard</span>
        </button>
        <button class="metodo-btn" aria-pressed="false">
          <span class="icon">🅿</span><span>PayPal</span>
        </button>
      </div>
    </section>

    <section aria-label="Resumen de orden">
      <div class="checkout-resumen">
        <p class="checkout-resumen__title">Resumen de tu Orden</p>

        <div class="checkout-resumen__item">
          <img src="img/Chumpa_blanca.png" alt="Chumpa Blanca Campus" />
          <div class="checkout-resumen__item-info">
            <p class="checkout-resumen__item-nombre">Chumpa Blanca Campus</p>
            <p class="checkout-resumen__item-qty">Cantidad: 1</p>
          </div>
          <p class="checkout-resumen__item-precio">Q249.00</p>
        </div>

        <div class="checkout-resumen__item">
          <img src="img/Camisa_azul_con_cuello.png" alt="Camisa Azul con Cuello" />
          <div class="checkout-resumen__item-info">
            <p class="checkout-resumen__item-nombre">Camisa Azul con Cuello</p>
            <p class="checkout-resumen__item-qty">Cantidad: 1</p>
          </div>
          <p class="checkout-resumen__item-precio">Q189.00</p>
        </div>

        <div class="checkout-resumen__item">
          <img src="img/Cargo_formal_corinto.png" alt="Cargo Formal Corinto" />
          <div class="checkout-resumen__item-info">
            <p class="checkout-resumen__item-nombre">Cargo Formal Corinto</p>
            <p class="checkout-resumen__item-qty">Cantidad: 1</p>
          </div>
          <p class="checkout-resumen__item-precio">Q229.00</p>
        </div>

        <hr class="checkout-resumen__divider" />
        <div class="checkout-resumen__total">
          <span>Total</span><span>Q692.00</span>
        </div>
      </div>
    </section>

    <div style="padding: 0 20px 32px;">
      <a href="historial.html" class="btn-primary">Pagar Q692.00</a>
    </div>

  </main>

</div>
</body>
</html>
